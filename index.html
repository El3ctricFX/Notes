<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log.sys</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Comfortable Graphite Palette */
            --bg: #1c1c1f;
            --surface: #27272a;
            --surface-hover: #323238;
            --text: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #3f3f46;
            --border-light: #52525b;
            --accent: #818cf8; /* Soft Indigo */
            --accent-hover: #6366f1;
            --danger: #fb7185;
            --danger-bg: rgba(251, 113, 133, 0.1);
            
            --console-bg: rgba(24, 24, 27, 0.95);
            --console-text: #6ee7b7;
        }
        
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        #sidebar {
            width: 260px;
            background-color: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .scrollable-feed {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .feed-container {
            width: 100%;
            max-width: 600px;
            padding-bottom: 120px;
        }

        /* Mobile menu button (hidden on desktop) */
        #menuToggle {
            display: none;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 10px;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #menuToggle:hover { background: var(--surface); }

        #sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9;
        }

        /* Sidebar Elements */
        .sidebar-header {
            padding: 28px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .status-ring {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-item {
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-item:hover {
            background-color: var(--surface);
            color: var(--text);
        }

        .nav-item.active {
            background-color: var(--surface-hover);
            color: var(--text);
            font-weight: 500;
        }

        .nav-count {
            background: rgba(0,0,0,0.2);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .nav-item.active .nav-count {
            color: var(--text);
            background: var(--border);
        }

        /* Top Header */
        header {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        h2.view-title { 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 600;
            letter-spacing: -0.02em;
            flex-shrink: 0;
        }

        .search-wrap {
            flex: 1;
            position: relative;
            max-width: 260px;
            margin-left: auto;
        }

        .search-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            padding: 8px 12px 8px 34px;
            border-radius: 20px;
            outline: none;
            transition: all 0.2s ease;
        }

        #searchInput::placeholder { color: var(--text-muted); }

        #searchInput:focus {
            border-color: var(--border-light);
            background: var(--surface-hover);
        }

        /* Compose Box (Modern Floating Style) */
        .compose {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0 0 24px 0;
            margin-bottom: 32px;
            display: flex;
            gap: 16px;
        }

        .compose-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            flex-shrink: 0;
        }

        .compose-body { flex: 1; }

        textarea.composer-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            min-height: 48px;
            padding-top: 6px;
        }

        textarea.composer-input::placeholder { color: var(--text-muted); }

        .compose-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .shortcut-hint { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Buttons */
        button {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 8px 18px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        button:hover { 
            background: var(--text-muted);
            transform: scale(0.98);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-outline:hover { 
            background: var(--surface); 
            color: var(--text);
            border-color: var(--border-light);
        }

        /* Threads Timeline */
        .day-group { margin-bottom: 40px; }

        .day-header {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .day-header::before, .day-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* True Threads-style Flex Layout */
        .thread {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Left Column (Timeline) */
        .thread-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 36px;
            flex-shrink: 0;
        }

        .thread-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .thread-dot::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-light);
            transition: background 0.2s ease;
        }

        .thread:hover .thread-dot::after { background: var(--accent); }

        .thread-line {
            width: 2px;
            flex: 1;
            background-color: var(--border);
            margin-top: 4px;
            margin-bottom: -16px; /* Connects to next post */
            min-height: 20px;
        }

        .day-group .thread:last-child .thread-line {
            display: none; /* Hide line on last post of the day */
        }

        /* Right Column (Content) */
        .thread-right {
            flex: 1;
            background: transparent;
            padding-bottom: 16px;
        }

        .thread-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            padding-top: 8px; /* Align with avatar center */
        }

        .thread-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .delete-btn {
            background: transparent;
            color: transparent;
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 12px;
        }

        .thread:hover .delete-btn { color: var(--border-light); }
        .delete-btn:hover { 
            color: var(--danger) !important; 
            background: var(--danger-bg);
        }

        .delete-btn.confirm {
            color: var(--danger) !important;
            background: var(--danger-bg);
        }

        .thread-content {
            line-height: 1.6;
            font-size: 0.95rem;
            color: var(--text);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        mark {
            background: rgba(129, 140, 248, 0.35);
            color: var(--text);
            border-radius: 3px;
            padding: 0 1px;
        }

        .edit-btn {
            background: transparent;
            color: transparent;
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 12px;
        }

        .thread:hover .edit-btn { color: var(--border-light); }
        .edit-btn:hover {
            color: var(--accent) !important;
            background: rgba(129, 140, 248, 0.1);
        }

        .thread-actions { display: flex; gap: 2px; }

        .edit-textarea {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--accent);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 10px 12px;
            border-radius: 10px;
            resize: vertical;
            min-height: 60px;
            outline: none;
        }

        .edit-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
        }

        .edit-actions button {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 80px 20px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state svg { color: var(--border-light); }
        .empty-state .empty-title { font-size: 0.95rem; font-weight: 500; color: var(--text); }
        .empty-state .empty-subtitle { font-size: 0.85rem; }

        /* Dev Console Overlay */
        #dev-console {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50vh;
            background: var(--console-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 50;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
        }

        #dev-console.open { transform: translateY(0); }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        .console-title {
            color: var(--console-text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .console-actions { display: flex; gap: 8px; }

        .console-actions button {
            padding: 6px 12px;
            font-size: 0.75rem;
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
        }
        
        .console-actions button:hover { background: var(--surface-hover); }

        #json-editor {
            flex: 1;
            width: 100%;
            background: transparent;
            color: #d4d4d8;
            font-family: 'JetBrains Mono', monospace;
            padding: 24px;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* Mobile Layout */
        @media (max-width: 768px) {
            #menuToggle { display: flex; }

            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                width: 260px;
                max-width: 80vw;
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
                z-index: 20;
            }

            #sidebar.mobile-open { transform: translateX(0); }

            #sidebar-backdrop.open { display: block; }

            .scrollable-feed { padding: 24px 16px 40px; }

            header { flex-wrap: wrap; }

            .search-wrap {
                max-width: none;
                margin-left: 0;
                order: 3;
                flex-basis: 100%;
            }

            h2.view-title { font-size: 1.25rem; }

            #dev-console { height: 70vh; }
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    </style>
</head>
<body>

    <div id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="status-ring"></div>
            <h1>Log.sys</h1>
        </div>
        <div class="nav-list" id="navList">
            <!-- Navigation items injected here -->
        </div>
        <div style="padding: 24px; margin-top: auto;">
            <button class="btn-outline" style="width: 100%; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;" onclick="toggleConsole()">
                { } CONSOLE <span style="opacity: 0.5; margin-left: 8px;">Ctrl+`</span>
            </button>
        </div>
    </aside>

    <main id="main-content">
        <div class="scrollable-feed">
            <div class="feed-container">
                <header>
                    <button id="menuToggle" onclick="toggleSidebar()" aria-label="Toggle menu">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h2 class="view-title" id="viewTitle">All Updates</h2>
                    <div class="search-wrap">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="searchInput" placeholder="Search threads..." oninput="onSearchInput(this.value)">
                    </div>
                </header>

                <div class="compose">
                    <div class="compose-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    </div>
                    <div class="compose-body">
                        <textarea id="postInput" class="composer-input" placeholder="Start a new thread..."></textarea>
                        <div class="compose-footer">
                            <span class="shortcut-hint">Ctrl + Enter to post</span>
                            <button onclick="addPost()">Post</button>
                        </div>
                    </div>
                </div>

                <div id="feed"></div>
            </div>
        </div>

        <div id="dev-console">
            <div class="console-header">
                <span class="console-title">~/local/state.json</span>
                <div class="console-actions">
                    <button onclick="exportJSON()">Download</button>
                    <button style="color: var(--danger);" onclick="clearData()">Wipe State</button>
                    <button style="background: var(--text); color: var(--bg);" onclick="applyJSON()">Apply State</button>
                    <button onclick="toggleConsole()" style="background: transparent;">✖</button>
                </div>
            </div>
            <textarea id="json-editor" spellcheck="false"></textarea>
        </div>
    </main>

    <script>
        const STORAGE_KEY = 'daily_activity_threads';
        let posts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let activeFilterBucket = null;
        let searchQuery = '';
        let editingId = null;

        // Auto-resize textarea
        const textarea = document.getElementById('postInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        // Groups a timestamp into a sidebar bucket: Today, Yesterday, This Week,
        // This Month, or a "Month Year" label for anything older.
        function getBucketLabel(isoString) {
            const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const target = startOfDay(new Date(isoString));
            const today = startOfDay(new Date());
            const diffDays = Math.round((today - target) / 86400000);

            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays > 1 && diffDays < 7) return 'This Week';
            if (target.getFullYear() === today.getFullYear() && target.getMonth() === today.getMonth()) return 'This Month';
            return target.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }

        function highlightMatch(text) {
            const safe = escapeHTML(text);
            if (!searchQuery.trim()) return safe;
            const q = searchQuery.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return safe.replace(new RegExp(`(${q})`, 'ig'), '<mark>$1</mark>');
        }

        function getFilteredPosts() {
            if (searchQuery.trim()) {
                const q = searchQuery.toLowerCase();
                return posts.filter(p => p.text.toLowerCase().includes(q));
            }
            if (activeFilterBucket !== null) {
                return posts.filter(p => getBucketLabel(p.timestamp) === activeFilterBucket);
            }
            return posts;
        }

        function onSearchInput(value) {
            searchQuery = value;
            refreshUI();
        }

        function addPost() {
            const input = document.getElementById('postInput');
            const text = input.value.trim();
            if (!text) return;

            posts.unshift({
                id: Date.now(),
                text: text,
                timestamp: new Date().toISOString()
            });

            save();
            input.value = '';
            input.style.height = 'auto';
            input.focus();

            if (activeFilterBucket && activeFilterBucket !== 'Today') {
                activeFilterBucket = null;
            }

            refreshUI();
        }

        let pendingDeleteId = null;
        let pendingDeleteTimer = null;

        function deletePost(id, btn) {
            // Second click on the same button within the window: actually delete.
            if (pendingDeleteId === id) {
                clearTimeout(pendingDeleteTimer);
                pendingDeleteId = null;
                posts = posts.filter(p => p.id !== id);
                if (editingId === id) editingId = null;
                save();
                refreshUI();
                return;
            }

            // Reset any other button that was mid-confirm.
            if (pendingDeleteId !== null) {
                const prevBtn = document.querySelector(`.delete-btn[data-id="${pendingDeleteId}"]`);
                if (prevBtn) { prevBtn.textContent = 'Delete'; prevBtn.classList.remove('confirm'); }
            }

            pendingDeleteId = id;
            btn.textContent = 'Confirm?';
            btn.classList.add('confirm');
            clearTimeout(pendingDeleteTimer);
            pendingDeleteTimer = setTimeout(() => {
                if (pendingDeleteId === id) {
                    btn.textContent = 'Delete';
                    btn.classList.remove('confirm');
                    pendingDeleteId = null;
                }
            }, 3000);
        }

        function editPost(id) {
            editingId = id;
            refreshUI();
            const ta = document.getElementById(`edit-${id}`);
            if (ta) {
                ta.focus();
                ta.setSelectionRange(ta.value.length, ta.value.length);
                ta.style.height = 'auto';
                ta.style.height = ta.scrollHeight + 'px';
            }
        }

        function cancelEdit() {
            editingId = null;
            refreshUI();
        }

        function saveEdit(id) {
            const ta = document.getElementById(`edit-${id}`);
            const newText = ta.value.trim();
            if (!newText) return;
            const post = posts.find(p => p.id === id);
            if (post) post.text = newText;
            editingId = null;
            save();
            refreshUI();
        }

        function refreshUI() {
            renderSidebar();
            renderFeed();
            
            if(document.getElementById('dev-console').classList.contains('open')) {
                document.getElementById('json-editor').value = JSON.stringify(posts, null, 2);
            }
        }

        function selectBucket(key) {
            activeFilterBucket = key;
            searchQuery = '';
            document.getElementById('searchInput').value = '';
            refreshUI();
            closeSidebar();
        }

        function renderSidebar() {
            const navList = document.getElementById('navList');
            navList.innerHTML = '';

            const buckets = {};
            posts.forEach(p => {
                const b = getBucketLabel(p.timestamp);
                if (!buckets[b]) buckets[b] = { count: 0, latest: p.timestamp };
                buckets[b].count++;
                if (p.timestamp > buckets[b].latest) buckets[b].latest = p.timestamp;
            });

            const fixedOrder = ['Today', 'Yesterday', 'This Week', 'This Month'];
            const bucketKeys = Object.keys(buckets).sort((a, b) => {
                const ai = fixedOrder.indexOf(a);
                const bi = fixedOrder.indexOf(b);
                if (ai !== -1 && bi !== -1) return ai - bi;
                if (ai !== -1) return -1;
                if (bi !== -1) return 1;
                return new Date(buckets[b].latest) - new Date(buckets[a].latest);
            });

            const allBtn = document.createElement('div');
            allBtn.className = `nav-item ${activeFilterBucket === null && !searchQuery ? 'active' : ''}`;
            allBtn.innerHTML = `<span>All Threads</span> <span class="nav-count">${posts.length}</span>`;
            allBtn.onclick = () => selectBucket(null);
            navList.appendChild(allBtn);

            bucketKeys.forEach(key => {
                const btn = document.createElement('div');
                btn.className = `nav-item ${activeFilterBucket === key && !searchQuery ? 'active' : ''}`;
                btn.innerHTML = `<span>${key}</span> <span class="nav-count">${buckets[key].count}</span>`;
                btn.onclick = () => selectBucket(key);
                navList.appendChild(btn);
            });

            document.getElementById('viewTitle').textContent = searchQuery.trim()
                ? `Search results`
                : (activeFilterBucket === null ? "All Threads" : activeFilterBucket);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('mobile-open');
            document.getElementById('sidebar-backdrop').classList.toggle('open');
        }

        function closeSidebar() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('mobile-open');
                document.getElementById('sidebar-backdrop').classList.remove('open');
            }
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            clearTimeout(pendingDeleteTimer);
            pendingDeleteId = null;

            const filteredPosts = getFilteredPosts();

            if (filteredPosts.length === 0) {
                const isSearching = searchQuery.trim().length > 0;
                feed.innerHTML = `
                    <div class="empty-state">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            ${isSearching
                                ? '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>'
                                : '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>'}
                        </svg>
                        <div class="empty-title">${isSearching ? 'No matches found' : 'Nothing here yet'}</div>
                        <div class="empty-subtitle">${isSearching ? `Nothing matches "${escapeHTML(searchQuery)}"` : 'Log what you\'re doing above to get started.'}</div>
                    </div>`;
                return;
            }

            const grouped = filteredPosts.reduce((acc, post) => {
                const day = formatDate(post.timestamp);
                if (!acc[day]) acc[day] = [];
                acc[day].push(post);
                return acc;
            }, {});

            for (const [day, dayPosts] of Object.entries(grouped)) {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'day-group';

                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                dayHeader.textContent = day;
                groupDiv.appendChild(dayHeader);

                dayPosts.forEach(post => {
                    const thread = document.createElement('div');
                    thread.className = 'thread';

                    const bodyHTML = post.id === editingId
                        ? `<textarea id="edit-${post.id}" class="edit-textarea" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';">${escapeHTML(post.text)}</textarea>
                           <div class="edit-actions">
                                <button class="btn-outline" onclick="cancelEdit()">Cancel</button>
                                <button onclick="saveEdit(${post.id})">Save</button>
                           </div>`
                        : `<div class="thread-content">${highlightMatch(post.text)}</div>`;

                    thread.innerHTML = `
                        <div class="thread-left">
                            <div class="thread-dot"></div>
                            <div class="thread-line"></div>
                        </div>
                        <div class="thread-right">
                            <div class="thread-header">
                                <span class="thread-time">${formatTime(post.timestamp)}</span>
                                <div class="thread-actions">
                                    <button class="edit-btn" onclick="editPost(${post.id})">Edit</button>
                                    <button class="delete-btn" data-id="${post.id}" onclick="deletePost(${post.id}, this)">Delete</button>
                                </div>
                            </div>
                            ${bodyHTML}
                        </div>
                    `;
                    groupDiv.appendChild(thread);
                });
                feed.appendChild(groupDiv);
            }
        }

        // DEV CONSOLE LOGIC
        function toggleConsole() {
            const consoleEl = document.getElementById('dev-console');
            const editor = document.getElementById('json-editor');
            
            consoleEl.classList.toggle('open');
            
            if (consoleEl.classList.contains('open')) {
                editor.value = JSON.stringify(posts, null, 2);
                setTimeout(() => editor.focus(), 100);
            }
        }

        function applyJSON() {
            try {
                const rawData = document.getElementById('json-editor').value;
                const parsed = JSON.parse(rawData);
                if (!Array.isArray(parsed)) throw new Error("Root element must be an array.");
                
                posts = parsed;
                save();
                refreshUI();
                
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = "State Applied";
                setTimeout(() => btn.textContent = originalText, 1500);
            } catch (error) {
                alert("JSON Error: " + error.message);
            }
        }

        function clearData() {
            if(confirm("Wipe all data?")) {
                posts = [];
                save();
                refreshUI();
            }
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(posts, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `threads_backup_${Date.now()}.json`);
            dlAnchorElem.click();
        }

        // Initialize
        refreshUI();

        // Shortcuts
        document.addEventListener('keydown', function(e) {
            const activeId = document.activeElement.id;

            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && activeId === 'postInput') {
                addPost();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && activeId.startsWith('edit-')) {
                saveEdit(editingId);
            }
            if ((e.ctrlKey || e.metaKey) && e.key === '`') {
                e.preventDefault();
                toggleConsole();
            }
            if (e.key === 'Escape' && document.getElementById('dev-console').classList.contains('open')) {
                toggleConsole();
            }
            if (e.key === 'Escape' && editingId !== null) {
                cancelEdit();
            }
            if (e.key === 'Escape' && document.getElementById('sidebar').classList.contains('mobile-open')) {
                closeSidebar();
            }
        });
    </script>
</body>
</html>
